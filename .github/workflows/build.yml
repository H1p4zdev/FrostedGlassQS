name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        validate-wrappers: false

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Update SDK and install platform 37
      run: |
        yes | sdkmanager --licenses 2>&1 || true
        yes | sdkmanager --install "cmdline-tools;latest" 2>&1 || true
        # Try installing android-37
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-37" 2>&1 || \
        yes | sdkmanager "platforms;android-37" 2>&1 || echo "android-37 not available in sdkmanager"
        echo "=== Installed platforms ==="
        ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: FrostedGlassQS-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: FrostedGlassQS-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
